<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>담보비율 계산기</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e293b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="담보비율">
  <link rel="apple-touch-icon" href="icon.svg">

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
    input[type=range] { accent-color: #3b82f6; }
    input[type=range]::-webkit-slider-thumb { cursor: pointer; }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          // 새 서비스워커가 감지되면 자동으로 페이지 새로고침
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'activated') {
                window.location.reload();
              }
            });
          });
        }).catch(() => {});
      });
    }
  </script>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

const MIN_RATIO = 140;

/* ── 숫자 포매터 ── */
const fmt  = (n) => (isNaN(n) || n == null) ? '0' : Math.round(n).toLocaleString('ko-KR');
const fmtW = (n) => `${fmt(n)}원`;
const fmtP = (n) => isFinite(n) ? `${n.toFixed(2)}%` : '∞%';

/* ── 초기 포트폴리오 ── */
const INIT_STOCKS = [
  { id: 1, name: 'SK하이닉스',    quantity: 145,  avgPrice: 0, currentPrice: 830000,  type: 'normal' },
  { id: 2, name: '삼성전자',      quantity: 955,  avgPrice: 0, currentPrice: 178400,  type: 'normal' },
  { id: 3, name: '삼성전자우',    quantity: 516,  avgPrice: 0, currentPrice: 118600,  type: 'normal' },
  { id: 4, name: '에이피알',      quantity: 1080, avgPrice: 0, currentPrice: 339500,  type: 'normal' },
  { id: 5, name: '에이피알(신용)', quantity: 920,  avgPrice: 0, currentPrice: 339500,  type: 'credit' },
];
const INIT_BONDS = 91210;
const INIT_CASH  = 3116725;
const INIT_LOAN  = 309230000;

/* ── 핵심 계산 ── */
function calc(stocks, bonds, cash, loan) {
  const won = stocks.filter(s => s.type === 'credit')
    .reduce((sum, s) => sum + (s.quantity||0) * (s.currentPrice||0), 0);
  const stockBu = stocks.filter(s => s.type === 'normal')
    .reduce((sum, s) => sum + (s.quantity||0) * (s.currentPrice||0), 0);
  const bu    = stockBu + (bonds||0) + (cash||0);
  const total = won + bu;
  const ratio = (loan > 0) ? (total / loan) * 100 : Infinity;
  const required = (loan||0) * (MIN_RATIO / 100);
  const shortage = Math.max(0, required - total);
  const surplus  = Math.max(0, total - required);
  return { won, bu, stockBu, total, ratio, required, shortage, surplus };
}

/* ── 추가매수 적용 → mergedStocks / extraLoan 반환 ── */
function applyExtraBuys(baseStocks, extraBuys) {
  let stocks = baseStocks.map(s => ({ ...s }));
  let extraLoan = 0;

  for (const buy of extraBuys) {
    const evalAmt = buy.qty * buy.price;
    if (buy.stockId === 'new') {
      stocks.push({
        id: `extra_${buy.id}`,
        name: buy.name,
        quantity: buy.qty,
        avgPrice: buy.price,
        currentPrice: buy.price,
        type: buy.type,
      });
    } else {
      const sid = parseInt(buy.stockId);
      stocks = stocks.map(s =>
        s.id === sid ? { ...s, quantity: s.quantity + buy.qty } : s
      );
    }
    if (buy.type === 'credit') extraLoan += evalAmt; // 대용증거금 방식: 매수금액 100% 융자 증가
  }
  return { mergedStocks: stocks, extraLoan };
}

/* ── 숫자 입력 컴포넌트 (쉼표 포매팅) ── */
function NumInput({ value, onChange, className = '', placeholder = '0' }) {
  const [focused, setFocused] = useState(false);
  const display = focused ? (value === 0 ? '' : String(value)) : fmt(value);
  return (
    <input
      type="text"
      inputMode="numeric"
      className={`border rounded-lg px-2 py-1.5 text-right text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 ${className}`}
      value={display}
      placeholder={placeholder}
      onFocus={() => setFocused(true)}
      onBlur={() => setFocused(false)}
      onChange={e => {
        const raw = e.target.value.replace(/,/g, '');
        const n = parseFloat(raw);
        onChange(isNaN(n) ? 0 : n);
      }}
    />
  );
}

/* ── 가격 직접 입력 전용 컴포넌트 ──
   포커스 중에는 로컬 버퍼를 표시하므로,
   외부 value가 재계산되어도 입력 중 커서/텍스트가 초기화되지 않음 ── */
function PriceInput({ value, onChange, className = '' }) {
  const [focused,   setFocused]   = useState(false);
  const [localVal,  setLocalVal]  = useState('');

  const handleFocus = () => {
    setFocused(true);
    setLocalVal(value === 0 ? '' : String(Math.round(value)));
  };
  const handleChange = (e) => {
    const raw = e.target.value.replace(/,/g, '');
    setLocalVal(raw);                       // 로컬 버퍼만 업데이트 (display 고정)
    const n = parseFloat(raw);
    if (!isNaN(n) && n >= 0) onChange(n);  // 유효 숫자일 때만 외부로 전달
  };
  const handleBlur = () => {
    setFocused(false);
    const n = parseFloat(localVal.replace(/,/g, ''));
    onChange(isNaN(n) || n < 0 ? 0 : n);
  };

  return (
    <input
      type="text"
      inputMode="numeric"
      className={`border rounded-lg px-2 py-1.5 text-right text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 ${className}`}
      value={focused ? localVal : fmt(value)}
      onFocus={handleFocus}
      onChange={handleChange}
      onBlur={handleBlur}
    />
  );
}

/* ══════════════════════════════════
   담보비율 요약 카드
══════════════════════════════════ */
function RatioCard({ result, label = '현재 담보비율', subLabel = null }) {
  const { won, bu, total, ratio, shortage, surplus } = result;
  const danger  = ratio < MIN_RATIO;
  const warning = ratio >= MIN_RATIO && ratio < 170;
  const ratioClass = danger ? 'text-red-500' : warning ? 'text-yellow-500' : 'text-emerald-500';
  const barClass   = danger ? 'bg-red-500'   : warning ? 'bg-yellow-400'   : 'bg-emerald-500';

  const MAX_DISPLAY = 350;
  const barPct  = Math.min(100, (ratio / MAX_DISPLAY) * 100);
  const mark140 = (140 / MAX_DISPLAY) * 100;
  const mark200 = (200 / MAX_DISPLAY) * 100;

  return (
    <div className="bg-white rounded-2xl shadow-md p-5 mb-4">
      <div className="flex items-center justify-between mb-1">
        <div>
          <span className="text-gray-500 font-semibold">{label}</span>
          {subLabel && <div className="text-xs text-blue-500 font-medium mt-0.5">{subLabel}</div>}
        </div>
        <span className={`text-4xl font-extrabold tabular-nums ${ratioClass}`}>{fmtP(ratio)}</span>
      </div>
      <div className="text-right text-xs text-gray-400 mb-3">최저유지 140% · 필요담보금액 {fmtW(result.required)}</div>

      {/* 게이지 바 */}
      <div className="relative mb-6">
        <div className="h-5 bg-gray-100 rounded-full overflow-visible">
          <div className={`h-full rounded-full transition-all duration-500 ${barClass}`}
               style={{ width: `${barPct}%` }} />
        </div>
        <div className="absolute top-0 bottom-0 flex flex-col items-center"
             style={{ left: `${mark140}%`, transform: 'translateX(-50%)' }}>
          <div className="absolute -top-5 text-xs font-bold text-red-500 whitespace-nowrap">140%</div>
          <div className="w-0.5 h-5 bg-red-500 mt-0" />
        </div>
        <div className="absolute top-0 bottom-0 flex flex-col items-center"
             style={{ left: `${mark200}%`, transform: 'translateX(-50%)' }}>
          <div className="absolute -top-5 text-xs font-bold text-emerald-600 whitespace-nowrap">200%</div>
          <div className="w-0.5 h-5 bg-emerald-500 mt-0" />
        </div>
      </div>

      <div className="grid grid-cols-3 gap-2 mb-3">
        {[
          { label: '총담보금액', val: total, bg: 'bg-blue-50',   txt: 'text-blue-800'   },
          { label: '원담보금액', val: won,   bg: 'bg-orange-50', txt: 'text-orange-800' },
          { label: '부담보금액', val: bu,    bg: 'bg-indigo-50', txt: 'text-indigo-800' },
        ].map(({ label: l, val, bg, txt }) => (
          <div key={l} className={`${bg} rounded-xl p-2.5 text-center`}>
            <div className="text-xs text-gray-400 mb-1">{l}</div>
            <div className={`text-xs font-bold ${txt} break-all`}>{fmtW(val)}</div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-2 gap-2">
        <div className={`rounded-xl p-2.5 text-center ${danger ? 'bg-red-50' : 'bg-gray-50'}`}>
          <div className="text-xs text-gray-400 mb-1">담보부족금액</div>
          <div className={`text-sm font-bold ${danger ? 'text-red-600' : 'text-gray-300'}`}>
            {shortage > 0 ? fmtW(shortage) : '부족 없음'}
          </div>
        </div>
        <div className={`rounded-xl p-2.5 text-center ${danger ? 'bg-red-50' : 'bg-emerald-50'}`}>
          <div className="text-xs text-gray-400 mb-1">140% 여유금액</div>
          <div className={`text-sm font-bold ${danger ? 'text-red-600' : 'text-emerald-600'}`}>
            {danger ? `-${fmtW(shortage)}` : fmtW(surplus)}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   탭 1 : 현재 포트폴리오
══════════════════════════════════ */
function Tab1({ stocks, setStocks, bonds, setBonds, cash, setCash, loan, setLoan }) {
  const [editId,   setEditId]   = useState(null);
  const [editData, setEditData] = useState({});
  const nextId = useRef(100);

  const startEdit  = (s) => { setEditId(s.id); setEditData({ ...s }); };
  const saveEdit   = () => {
    setStocks(prev => prev.map(s => s.id === editId ? { ...editData } : s));
    setEditId(null);
  };
  const cancelEdit  = () => setEditId(null);
  const deleteStock = (id) => setStocks(prev => prev.filter(s => s.id !== id));
  const addStock    = () => {
    const ns = { id: nextId.current++, name: '신규종목', quantity: 0, avgPrice: 0, currentPrice: 0, type: 'normal' };
    setStocks(prev => [...prev, ns]);
    startEdit(ns);
  };

  return (
    <div>
      <div className="overflow-x-auto mb-3">
        <table className="w-full text-sm bg-white rounded-xl shadow overflow-hidden min-w-[420px]">
          <thead className="bg-slate-700 text-white text-xs">
            <tr>
              <th className="px-3 py-2 text-left">종목명</th>
              <th className="px-3 py-2 text-right">수량</th>
              <th className="px-3 py-2 text-right">현재가</th>
              <th className="px-3 py-2 text-right">평가금액</th>
              <th className="px-3 py-2 text-center">구분</th>
              <th className="px-3 py-2 text-center">관리</th>
            </tr>
          </thead>
          <tbody>
            {stocks.map((s, i) => {
              const isEditing = editId === s.id;
              const evalAmt   = (s.quantity||0) * (s.currentPrice||0);

              if (isEditing) return (
                <tr key={s.id} className="bg-yellow-50 border-b border-yellow-100">
                  <td className="px-2 py-1.5">
                    <input className="border rounded px-1.5 py-0.5 w-full text-sm"
                      value={editData.name}
                      onChange={e => setEditData(d => ({ ...d, name: e.target.value }))} />
                  </td>
                  <td className="px-2 py-1.5">
                    <NumInput value={editData.quantity}
                      onChange={v => setEditData(d => ({ ...d, quantity: v }))} className="w-full" />
                  </td>
                  <td className="px-2 py-1.5">
                    <NumInput value={editData.currentPrice}
                      onChange={v => setEditData(d => ({ ...d, currentPrice: v }))} className="w-full" />
                  </td>
                  <td className="px-2 py-1.5 text-right text-gray-400 text-xs">
                    {fmtW((editData.quantity||0) * (editData.currentPrice||0))}
                  </td>
                  <td className="px-2 py-1.5">
                    <select className="border rounded px-1 py-0.5 text-sm w-full"
                      value={editData.type}
                      onChange={e => setEditData(d => ({ ...d, type: e.target.value }))}>
                      <option value="normal">일반</option>
                      <option value="credit">신용</option>
                    </select>
                  </td>
                  <td className="px-2 py-1.5 text-center space-x-1 whitespace-nowrap">
                    <button onClick={saveEdit}
                      className="bg-blue-500 hover:bg-blue-600 text-white rounded px-2 py-0.5 text-xs">저장</button>
                    <button onClick={cancelEdit}
                      className="bg-gray-300 hover:bg-gray-400 text-gray-700 rounded px-2 py-0.5 text-xs">취소</button>
                  </td>
                </tr>
              );

              return (
                <tr key={s.id} className={`border-b hover:bg-gray-50 ${i % 2 !== 0 ? 'bg-gray-50/40' : ''}`}>
                  <td className="px-3 py-2 font-medium">
                    {s.name}
                    {s.type === 'credit' &&
                      <span className="ml-1.5 bg-orange-100 text-orange-600 text-xs px-1 rounded">신용</span>}
                  </td>
                  <td className="px-3 py-2 text-right tabular-nums">{fmt(s.quantity)}</td>
                  <td className="px-3 py-2 text-right tabular-nums">{fmt(s.currentPrice)}</td>
                  <td className="px-3 py-2 text-right font-medium tabular-nums">{fmtW(evalAmt)}</td>
                  <td className="px-3 py-2 text-center">
                    <span className={`px-2 py-0.5 rounded text-xs font-medium
                      ${s.type === 'credit' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}`}>
                      {s.type === 'credit' ? '신용' : '일반'}
                    </span>
                  </td>
                  <td className="px-3 py-2 text-center whitespace-nowrap">
                    <button onClick={() => startEdit(s)}
                      className="text-blue-500 hover:text-blue-700 text-xs mr-2">수정</button>
                    <button onClick={() => deleteStock(s.id)}
                      className="text-red-400 hover:text-red-600 text-xs">삭제</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <button onClick={addStock}
        className="mb-4 bg-blue-500 hover:bg-blue-600 text-white rounded-lg px-4 py-2 text-sm font-medium shadow">
        + 종목 추가
      </button>

      <div className="bg-white rounded-xl shadow p-4">
        <h3 className="font-semibold text-gray-600 text-sm mb-3">기타 자산 · 부채</h3>
        <div className="grid grid-cols-1 gap-3 sm:grid-cols-3">
          {[
            { label: '채권평가금액', val: bonds, set: setBonds, cls: 'bg-gray-50' },
            { label: '현금예수금',   val: cash,  set: setCash,  cls: 'bg-gray-50' },
            { label: '신용융자금액', val: loan,  set: setLoan,  cls: 'bg-red-50'  },
          ].map(({ label, val, set, cls }) => (
            <div key={label}>
              <label className="text-xs text-gray-400 block mb-1">{label}</label>
              <NumInput value={val} onChange={set} className={`w-full ${cls}`} />
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   탭 2 : 추가매수 시뮬레이션 (다중 입력)
══════════════════════════════════ */
function Tab2({ stocks, bonds, cash, loan, extraBuys, setExtraBuys }) {
  const nextId = useRef(500);

  /* 입력 폼 상태 */
  const [selId,    setSelId]    = useState('new');
  const [newName,  setNewName]  = useState('');
  const [addQty,   setAddQty]   = useState(0);
  const [addPrice, setAddPrice] = useState(0);
  const [addType,  setAddType]  = useState('normal');

  const baseResult = useMemo(() => calc(stocks, bonds, cash, loan), [stocks, bonds, cash, loan]);

  /* 현재까지 쌓인 extraBuys 모두 반영한 결과 */
  const { mergedStocks, extraLoan } = useMemo(
    () => applyExtraBuys(stocks, extraBuys),
    [stocks, extraBuys]
  );
  const mergedResult = useMemo(
    () => calc(mergedStocks, bonds, cash, loan + extraLoan),
    [mergedStocks, bonds, cash, loan, extraLoan]
  );

  /* 폼 유효성 */
  const formValid = addQty > 0 && addPrice > 0 && (selId !== 'new' || newName.trim() !== '');

  /* 미리보기: 현재 폼 값 추가 시 */
  const previewResult = useMemo(() => {
    if (!formValid) return null;
    const previewBuy = {
      id: -1,
      stockId: selId,
      name: selId === 'new' ? newName : (stocks.find(s => s.id === parseInt(selId))?.name || '?'),
      qty: addQty,
      price: addPrice,
      type: addType,
    };
    const { mergedStocks: ms, extraLoan: el } = applyExtraBuys(stocks, [...extraBuys, previewBuy]);
    return calc(ms, bonds, cash, loan + el);
  }, [stocks, bonds, cash, loan, extraBuys, selId, newName, addQty, addPrice, addType, formValid]);

  const handleAdd = () => {
    if (!formValid) return;
    const stockName = selId === 'new'
      ? newName
      : (stocks.find(s => s.id === parseInt(selId))?.name || '?');
    setExtraBuys(prev => [...prev, {
      id: nextId.current++,
      stockId: selId,
      name: stockName,
      qty: addQty,
      price: addPrice,
      type: addType,
    }]);
    setAddQty(0);
    setAddPrice(0);
    if (selId === 'new') setNewName('');
  };

  const removeBuy = (id) => setExtraBuys(prev => prev.filter(b => b.id !== id));
  const clearAll  = () => setExtraBuys([]);

  const totalRatioChange = mergedResult.ratio - baseResult.ratio;

  return (
    <div>
      {/* ── 추가 매수 입력 폼 ── */}
      <div className="bg-white rounded-xl shadow p-4 mb-4">
        <h3 className="font-semibold text-gray-600 text-sm mb-3">매수 추가</h3>
        <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">

          <div className="sm:col-span-2">
            <label className="text-xs text-gray-400 block mb-1">종목 선택</label>
            <select className="w-full border rounded-lg px-2 py-1.5 text-sm"
              value={selId} onChange={e => setSelId(e.target.value)}>
              <option value="new">+ 신규 종목</option>
              {stocks.map(s => (
                <option key={s.id} value={s.id}>
                  {s.name} ({s.type === 'credit' ? '신용' : '일반'}) — {fmt(s.currentPrice)}원
                </option>
              ))}
            </select>
          </div>

          {selId === 'new' && (
            <div className="sm:col-span-2">
              <label className="text-xs text-gray-400 block mb-1">종목명</label>
              <input className="w-full border rounded-lg px-2 py-1.5 text-sm"
                value={newName} onChange={e => setNewName(e.target.value)}
                placeholder="종목명 입력" />
            </div>
          )}

          <div>
            <label className="text-xs text-gray-400 block mb-1">수량</label>
            <NumInput value={addQty} onChange={setAddQty} className="w-full bg-gray-50" />
          </div>
          <div>
            <label className="text-xs text-gray-400 block mb-1">매수 가격</label>
            <NumInput value={addPrice} onChange={setAddPrice} className="w-full bg-gray-50" />
          </div>

          <div className="sm:col-span-2">
            <label className="text-xs text-gray-400 block mb-1">잔고 구분</label>
            <div className="flex gap-2">
              {['normal', 'credit'].map(t => (
                <button key={t} onClick={() => setAddType(t)}
                  className={`flex-1 py-2 rounded-lg text-sm font-semibold border transition-all
                    ${addType === t
                      ? (t === 'normal' ? 'bg-blue-500 text-white border-blue-500' : 'bg-orange-500 text-white border-orange-500')
                      : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                  {t === 'normal' ? '일반' : '신용'}
                </button>
              ))}
            </div>
          </div>

          {/* 미리보기 */}
          {previewResult && (
            <div className="sm:col-span-2 bg-slate-50 rounded-lg p-3 text-sm space-y-1">
              <div className="flex justify-between">
                <span className="text-gray-500">매수금액</span>
                <span className="font-bold">{fmtW(addQty * addPrice)}</span>
              </div>
              {addType === 'credit' && (
                <div className="flex justify-between text-orange-600">

                    {buy.type === 'credit' ? '신용' : '일반'}

                <div className="flex items-center gap-3">

                    <div className="tabular-nums text-xs text-gray-500">

            <div className="flex justify-between text-gray-500 mb-1">
              <span>총 추가매수금액</span>
              <span className="font-bold tabular-nums text-gray-700">
                {fmtW(extraBuys.reduce((s, b) => s + b.qty * b.price, 0))}

              <div className="flex justify-between text-orange-600">
                <span>총 융자증가</span>

      {/* ── 결과 비교 ── */}
      <div className="bg-white rounded-xl shadow p-4">
        <h3 className="font-semibold text-gray-600 text-sm mb-3">전후 비교</h3>
        <div className="grid grid-cols-2 gap-3 mb-3">

            <div className="text-xs text-gray-400 mb-1">추가매수 전</div>

/* ══════════════════════════════════
   탭 3 : 가격 시나리오 (추가매수 반영)
══════════════════════════════════ */
function Tab3({ mergedStocks, bonds, cash, mergedLoan, extraBuyCount, changes, setChanges }) {
  const getChg = id => changes[id] ?? 0;
  const setChg = (id, v) => setChanges(prev => ({ ...prev, [id]: v }));
  const resetAll = () => setChanges({});

  const simStocks = useMemo(() =>
    mergedStocks.map(s => ({
      ...s,
      currentPrice: Math.max(0, s.currentPrice * (1 + getChg(s.id) / 100)),
    })), [mergedStocks, changes]);

  const result     = useMemo(() => calc(simStocks, bonds, cash, mergedLoan),     [simStocks, bonds, cash, mergedLoan]);
  const baseResult = useMemo(() => calc(mergedStocks, bonds, cash, mergedLoan),  [mergedStocks, bonds, cash, mergedLoan]);
  const diff       = result.ratio - baseResult.ratio;

  const subLabel = extraBuyCount > 0 ? `추가매수 ${extraBuyCount}건 반영 중` : null;

  return (
    <div>
      <RatioCard result={result} label="시나리오 담보비율" subLabel={subLabel} />

      {Math.abs(diff) > 0.005 && (
        <div className={`mb-4 text-center rounded-xl py-2.5 font-bold text-sm
          ${diff >= 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>
          기준 대비 {diff >= 0 ? '▲' : '▼'} {Math.abs(diff).toFixed(2)}%p
        </div>
      )}

      <div className="bg-white rounded-xl shadow p-4">
        <div className="flex justify-between items-center mb-4">
          <div>
            <h3 className="font-semibold text-gray-600 text-sm">종목별 가격 시나리오</h3>
            {extraBuyCount > 0 && (
              <p className="text-xs text-blue-500 mt-0.5">추가매수 {extraBuyCount}건이 수량에 반영됨</p>
            )}
          </div>
          <button onClick={resetAll}
            className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-500 rounded px-2 py-1">
            전체 초기화
          </button>
        </div>

        <div className="space-y-4">
          {mergedStocks.map(s => {
            const chg      = getChg(s.id);
            const simPrice = Math.max(0, s.currentPrice * (1 + chg / 100));
            const isExtra  = String(s.id).startsWith('extra_');

            /* 가격 직접 입력 → % 역산 */
            const handlePriceChange = (newPrice) => {
              if (s.currentPrice <= 0) return;
              const newChg = ((newPrice - s.currentPrice) / s.currentPrice) * 100;
              setChg(s.id, Math.round(newChg * 10) / 10);
            };

            return (
              <div key={s.id} className={`border rounded-xl p-3 ${isExtra ? 'border-blue-200 bg-blue-50/30' : 'border-gray-100'}`}>
                {/* 종목 헤더 */}
                <div className="flex justify-between items-center mb-3">
                  <div>
                    <span className="font-medium text-sm">{s.name}</span>
                    <span className={`ml-2 text-xs px-1.5 py-0.5 rounded
                      ${s.type === 'credit' ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'}`}>
                      {s.type === 'credit' ? '신용' : '일반'}
                    </span>
                    {isExtra && (
                      <span className="ml-1 text-xs px-1.5 py-0.5 rounded bg-blue-100 text-blue-500">추가매수</span>
                    )}
                    <span className="ml-2 text-xs text-gray-400">{fmt(s.quantity)}주</span>
                  </div>
                  <div className="text-xs text-gray-300">기준가 {fmt(s.currentPrice)}원</div>
                </div>

                {/* 가격 직접 입력 + % 입력 한 줄 */}
                <div className="flex items-center gap-2 mb-2">
                  {/* 시나리오 가격 직접 입력 */}
                  <div className="flex items-center gap-1 flex-1">
                    <span className="text-xs text-gray-400 shrink-0">시나리오가</span>
                    <PriceInput
                      value={simPrice}
                      onChange={handlePriceChange}
                      className={`flex-1 font-bold text-sm
                        ${chg < 0 ? 'text-blue-600 border-blue-200 bg-blue-50'
                          : chg > 0 ? 'text-red-500 border-red-200 bg-red-50'
                          : 'text-gray-700 bg-gray-50'}`}
                    />
                    <span className="text-xs text-gray-400 shrink-0">원</span>
                  </div>

                  {/* 구분선 */}
                  <div className="text-gray-200 text-sm shrink-0">|</div>

                  {/* % 입력 */}
                  <div className="flex items-center gap-0.5 shrink-0">
                    <input type="number" min="-80" max="200"
                      value={chg}
                      onChange={e => setChg(s.id, parseFloat(e.target.value) || 0)}
                      className={`w-14 border rounded px-1 py-1.5 text-sm text-right font-bold focus:outline-none focus:ring-1 focus:ring-blue-300
                        ${chg < 0 ? 'text-blue-600 border-blue-200 bg-blue-50'
                          : chg > 0 ? 'text-red-500 border-red-200 bg-red-50'
                          : 'text-gray-600 bg-gray-50'}`} />
                    <span className="text-sm text-gray-400">%</span>
                  </div>
                </div>

                {/* 슬라이더 */}
                <input type="range" min="-80" max="50" step="1"
                  value={Math.max(-80, Math.min(50, chg))}
                  onChange={e => setChg(s.id, parseFloat(e.target.value))}
                  className="w-full mb-2" />

                {/* 평가금액 */}
                <div className="flex justify-between text-xs text-gray-400">
                  <span>평가금액</span>
                  <span className="tabular-nums font-medium">
                    {fmtW(s.quantity * simPrice)}
                    {chg !== 0 && (
                      <span className={`ml-1 ${chg < 0 ? 'text-blue-500' : 'text-red-500'}`}>
                        ({chg > 0 ? '+' : ''}{fmtW((simPrice - s.currentPrice) * s.quantity)})
                      </span>
                    )}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   동기화 모달
══════════════════════════════════ */
function SyncModal({ data, onImport, onClose }) {
  const [mode, setMode]       = useState('export'); // 'export' | 'import'
  const [importCode, setImportCode] = useState('');
  const [error, setError]     = useState('');
  const [copied, setCopied]   = useState(false);

  const exportCode = useMemo(() => {
    try {
      return btoa(encodeURIComponent(JSON.stringify(data)));
    } catch { return ''; }
  }, [data]);

  const handleCopy = () => {
    navigator.clipboard.writeText(exportCode).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const handleImport = () => {
    try {
      const json = JSON.parse(decodeURIComponent(atob(importCode.trim())));
      if (!json.stocks || !Array.isArray(json.stocks)) throw new Error('잘못된 형식');
      onImport(json);
      onClose();
    } catch {
      setError('올바르지 않은 코드입니다. 다시 확인해주세요.');
    }
  };

  return (
    <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-4"
         onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-5">
        <div className="flex justify-between items-center mb-4">
          <h2 className="font-bold text-gray-700 text-base">데이터 동기화</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
        </div>

        {/* 탭 */}
        <div className="flex gap-1 bg-gray-100 rounded-lg p-1 mb-4">
          {[['export','내보내기 (공유)'], ['import','가져오기']].map(([m, label]) => (
            <button key={m} onClick={() => { setMode(m); setError(''); }}
              className={`flex-1 py-1.5 text-xs font-semibold rounded-md transition-all
                ${mode === m ? 'bg-white shadow text-slate-700' : 'text-gray-400'}`}>
              {label}
            </button>
          ))}
        </div>

        {mode === 'export' ? (
          <>
            <p className="text-xs text-gray-500 mb-3">
              아래 코드를 복사해서 다른 기기의 <strong>가져오기</strong>에 붙여넣으세요.
            </p>
            <textarea
              readOnly
              rows={4}
              className="w-full border rounded-xl p-3 text-xs text-gray-600 bg-gray-50 font-mono resize-none focus:outline-none"
              value={exportCode}
            />
            <button onClick={handleCopy}
              className={`mt-3 w-full py-2.5 rounded-xl text-sm font-bold transition-all
                ${copied ? 'bg-emerald-500 text-white' : 'bg-slate-700 hover:bg-slate-800 text-white'}`}>
              {copied ? '✓ 복사됨!' : '코드 복사하기'}
            </button>
          </>
        ) : (
          <>
            <p className="text-xs text-gray-500 mb-3">
              다른 기기에서 복사한 코드를 붙여넣고 가져오기를 누르세요.
            </p>
            <textarea
              rows={4}
              className="w-full border rounded-xl p-3 text-xs text-gray-600 bg-gray-50 font-mono resize-none focus:outline-none focus:ring-2 focus:ring-blue-300"
              placeholder="코드를 붙여넣으세요..."
              value={importCode}
              onChange={e => { setImportCode(e.target.value); setError(''); }}
            />
            {error && <p className="text-xs text-red-500 mt-1">{error}</p>}
            <button onClick={handleImport}
              disabled={!importCode.trim()}
              className={`mt-3 w-full py-2.5 rounded-xl text-sm font-bold transition-all
                ${importCode.trim()
                  ? 'bg-blue-500 hover:bg-blue-600 text-white'
                  : 'bg-gray-100 text-gray-300 cursor-not-allowed'}`}>
              데이터 가져오기
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   localStorage 헬퍼
══════════════════════════════════ */
const STORAGE_KEY = 'dambo_v1';
function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}
function saveStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function App() {
  const saved = useMemo(() => loadStorage(), []);

  const [stocks,    setStocks]    = useState(saved?.stocks    ?? INIT_STOCKS);
  const [bonds,     setBonds]     = useState(saved?.bonds     ?? INIT_BONDS);
  const [cash,      setCash]      = useState(saved?.cash      ?? INIT_CASH);
  const [loan,      setLoan]      = useState(saved?.loan      ?? INIT_LOAN);
  const [extraBuys,       setExtraBuys]       = useState(saved?.extraBuys ?? []);
  const [scenarioChanges, setScenarioChanges] = useState({});
  const [tab,             setTab]             = useState('portfolio');
  const [showSync,        setShowSync]        = useState(false);

  /* localStorage 자동 저장 */
  useEffect(() => {
    saveStorage({ stocks, bonds, cash, loan, extraBuys });
  }, [stocks, bonds, cash, loan, extraBuys]);

  /* 동기화 가져오기 */
  const handleSyncImport = (json) => {
    if (json.stocks)    setStocks(json.stocks);
    if (json.bonds != null) setBonds(json.bonds);
    if (json.cash  != null) setCash(json.cash);
    if (json.loan  != null) setLoan(json.loan);
    if (json.extraBuys) setExtraBuys(json.extraBuys);
  };

  /* 추가매수 반영 merged 상태 */
  const { mergedStocks, extraLoan } = useMemo(
    () => applyExtraBuys(stocks, extraBuys),
    [stocks, extraBuys]
  );
  const mergedLoan = loan + extraLoan;

  /* 헤더: 기본 포트폴리오 기준 */
  const baseResult   = useMemo(() => calc(stocks, bonds, cash, loan), [stocks, bonds, cash, loan]);
  const ratioClass   = baseResult.ratio < MIN_RATIO ? 'text-red-400'
    : baseResult.ratio < 170 ? 'text-yellow-400' : 'text-emerald-400';

  const TABS = [
    { id: 'portfolio', label: '포트폴리오' },
    { id: 'buy',       label: '추가매수'   },
    { id: 'scenario',  label: '가격시나리오' },
  ];

  return (
    <div className="max-w-2xl mx-auto px-3 py-4 pb-10">
      {showSync && (
        <SyncModal
          data={{ stocks, bonds, cash, loan, extraBuys }}
          onImport={handleSyncImport}
          onClose={() => setShowSync(false)}
        />
      )}
      {/* 헤더 */}
      <div className="bg-slate-800 text-white rounded-2xl px-5 py-4 mb-4 shadow-lg">
        <div className="flex items-center justify-between">
          <div>
            <h1 className="text-xl font-extrabold tracking-tight">담보비율 계산기</h1>
            <p className="text-slate-400 text-xs mt-0.5">삼성증권 신용융자 · 최저유지 140%</p>
          </div>
          <div className="text-right">
            <div className={`text-3xl font-extrabold tabular-nums ${ratioClass}`}>
              {fmtP(baseResult.ratio)}
            </div>
            <div className="text-xs text-slate-400 mt-0.5">융자 {fmtW(loan)}</div>
            {extraBuys.length > 0 && (
              <div className="text-xs text-blue-400 mt-0.5">추가매수 {extraBuys.length}건 시뮬레이션 중</div>
            )}
          </div>
        </div>
        <button onClick={() => setShowSync(true)}
          className="mt-3 w-full flex items-center justify-center gap-1.5 bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white text-xs font-medium rounded-xl py-2 transition-all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
          기기 간 동기화
        </button>
      </div>

      {/* 탭 네비게이션 */}
      <div className="flex gap-1 mb-4 bg-white rounded-xl p-1 shadow">
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-all relative
              ${tab === t.id
                ? 'bg-slate-700 text-white shadow-sm'
                : 'text-gray-400 hover:text-gray-600 hover:bg-gray-50'}`}>
            {t.label}
            {t.id === 'buy' && extraBuys.length > 0 && (
              <span className="absolute -top-1 -right-1 bg-blue-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center leading-none">
                {extraBuys.length}
              </span>
            )}
          </button>
        ))}
      </div>

      {/* 탭 내용 — display로 숨기기/보이기 (언마운트 없음 → 상태 유지) */}
      <div style={{ display: tab === 'portfolio' ? 'block' : 'none' }}>
        <RatioCard result={baseResult} />
        <Tab1
          stocks={stocks} setStocks={setStocks}
          bonds={bonds}   setBonds={setBonds}
          cash={cash}     setCash={setCash}
          loan={loan}     setLoan={setLoan}
        />
      </div>
      <div style={{ display: tab === 'buy' ? 'block' : 'none' }}>
        <Tab2
          stocks={stocks} bonds={bonds} cash={cash} loan={loan}
          extraBuys={extraBuys} setExtraBuys={setExtraBuys}
        />
      </div>
      <div style={{ display: tab === 'scenario' ? 'block' : 'none' }}>
        <Tab3
          mergedStocks={mergedStocks}
          bonds={bonds} cash={cash}
          mergedLoan={mergedLoan}
          extraBuyCount={extraBuys.length}
          changes={scenarioChanges}
          setChanges={setScenarioChanges}
        />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
